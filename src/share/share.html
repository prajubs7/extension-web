<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Opening Extension App...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f9fafb;
    }
    .box {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h2 { color: #e53935; margin-bottom: 8px; font-size: 20px; }
    p  { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    .store-btn {
      display: inline-block;
      background: #e53935;
      color: white;
      padding: 12px 28px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin: 6px;
      transition: opacity 0.2s;
    }
    .store-btn:hover { opacity: 0.85; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #e53935;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔗</div>
    <h2>Extension App</h2>
    <div class="spinner" id="spinner"></div>
    <p id="statusText">Redirecting you to the app...</p>
    <a class="store-btn" id="storeLink" href="https://extension-pbsweb.netlify.app">
      Get the App
    </a>
  </div>

  <script>
    const ref        = new URLSearchParams(window.location.search).get('ref');
    const isAndroid  = /android/i.test(navigator.userAgent);
    const isIOS      = /iphone|ipad|ipod/i.test(navigator.userAgent);

    // ✅ Single source of truth — update only here
    const PACKAGE_NAME = 'com.shareimpl';
    const WEBSITE      = 'https://extension-pbsweb.netlify.app';
    const PLAY_STORE   = `https://play.google.com/store/apps/details?id=${PACKAGE_NAME}`;
    const APP_STORE    = 'https://apps.apple.com/app/YOUR_APP_ID'; // update when published

    const storeLink  = document.getElementById('storeLink');
    const statusText = document.getElementById('statusText');
    const spinner    = document.getElementById('spinner');

    function hideSpinner() {
      spinner.style.display = 'none';
    }

    // No ref param — send to homepage
    if (!ref) {
      window.location.href = WEBSITE;

    } else if (isAndroid) {
      storeLink.href        = PLAY_STORE;
      storeLink.textContent = 'Get on Google Play';
      statusText.textContent = 'Opening app...';

      // Try Android App Links (intent://) — falls back to Play Store if not installed
      const fallback = encodeURIComponent(PLAY_STORE);
      window.location.href =
        `intent://share?ref=${ref}#Intent;scheme=extensionapp;package=${PACKAGE_NAME};S.browser_fallback_url=${fallback};end`;

      // If intent didn't work after 2s, show the button
      setTimeout(() => {
        hideSpinner();
        statusText.textContent = 'App not found. Get it below:';
      }, 2000);

    } else if (isIOS) {
      storeLink.href        = APP_STORE;
      storeLink.textContent = 'Get on App Store';
      statusText.textContent = 'Opening app...';

      // Try custom scheme — if app installed it will open
      window.location.href = `extensionapp://share?ref=${ref}`;

      // Fallback to App Store after 1.5s if app not installed
      setTimeout(() => {
        hideSpinner();
        statusText.textContent = 'App not found. Get it below:';
        window.location.href = APP_STORE;
      }, 1500);

    } else {
      // Desktop — go to homepage
      hideSpinner();
      statusText.textContent = 'Open this link on your mobile device.';
      storeLink.href        = WEBSITE;
      storeLink.textContent = 'Visit Website';
    }
  </script>
</body>
</html>
